# Dependabot will run on day 3 of each month at 02:55 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '55 2 3 * *'
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    assignees:
      - 'typhosj'
    versioning-strategy: 'increase'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '55 2 3 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'typhosj'
