<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" type="text/css" href="../../css/adapter.css">
	<link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

	<script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="../../socket.io/socket.io.js"></script>
	<script type="text/javascript" src="../../lib/js/materialize.js"></script>
	<script type="text/javascript" src="../../js/translate.js"></script>
	<script type="text/javascript" src="../../js/adapter-settings.js"></script>
	<script type="text/javascript" src="words.js"></script>
	<script type="text/javascript" src="index_m.js"></script>

	<style>
		.discovery-actions {
			display: flex;
			gap: 0.75rem;
			flex-wrap: wrap;
			align-items: center;
			margin-top: 1rem;
		}

		.discovery-result {
			margin-top: 1rem;
		}

		.discovery-result table {
			margin-top: 0.5rem;
		}

		.discovery-empty {
			color: #777;
			margin-top: 0.75rem;
		}

		.m.adapter-container input[type="checkbox"].value {
			appearance: auto !important;
			opacity: 1 !important;
			pointer-events: auto !important;
			position: static !important;
			margin-right: 0.5rem;
			width: 1rem;
			height: 1rem;
		}

		.m.adapter-container input[type="checkbox"].value + span {
			padding-left: 0 !important;
			vertical-align: middle;
		}

		.m.adapter-container input[type="checkbox"].value + span::before,
		.m.adapter-container input[type="checkbox"].value + span::after {
			display: none !important;
		}
	</style>
</head>
<body>
<div class="m adapter-container">
	<div class="row">
		<div class="col s12">
			<ul class="tabs">
				<li class="tab col s6"><a class="active" href="#tab-basic">Basic settings</a></li>
				<li class="tab col s6"><a href="#tab-advanced">Advanced settings</a></li>
			</ul>
		</div>
	</div>

	<div id="tab-basic" class="col s12">
		<div class="row">
			<div class="input-field col s12 m9">
				<input class="value" id="ipAddr" type="text" placeholder="192.168.1.42">
				<label for="ipAddr">Inverter IP</label>
				<span class="helper-text">Only the IPv4 address is saved here.</span>
			</div>
			<div class="input-field col s12 m3">
				<a id="validateIp" class="waves-effect waves-light btn-small blue">Validate inverter IP</a>
			</div>
		</div>

		<div class="row">
			<div class="input-field col s12 m6">
				<input class="value" id="discoverySubnet" type="text" placeholder="192.168.1.0/24">
				<label for="discoverySubnet">Discovery subnet</label>
				<span class="helper-text">Optional /24 subnet. Empty uses configured IP and local interfaces.</span>
			</div>
			<div class="input-field col s12 m6 discovery-actions">
				<a id="discoverInverters" class="waves-effect waves-light btn-small blue">Discover inverters</a>
			</div>
		</div>

		<div id="discoveryResult" class="discovery-result"></div>

		<div class="row">
			<div class="input-field col s12 m4">
				<input class="value number" id="pollCycle" type="number" min="10" max="3600">
				<label for="pollCycle">Poll cycle</label>
				<span class="helper-text">Seconds</span>
			</div>
			<div class="input-field col s12 m4">
				<input class="value number" id="timeoutMs" type="number" min="1000" max="30000">
				<label for="timeoutMs">Timeout</label>
				<span class="helper-text">Milliseconds</span>
			</div>
			<div class="input-field col s12 m4">
				<input class="value number" id="retries" type="number" min="0" max="5">
				<label for="retries">Retries</label>
			</div>
		</div>
	</div>

	<div id="tab-advanced" class="col s12">
		<div class="row">
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollExtended" type="checkbox">
					<span>Poll extended registers</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollSimccid" type="checkbox">
					<span>Poll SIMCCID</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollExtendedMeter" type="checkbox">
					<span>Poll extended meter</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollFlashInfo" type="checkbox">
					<span>Poll flash info</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollBmsExtended" type="checkbox">
					<span>Poll BMS extended</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollBmsDetail" type="checkbox">
					<span>Poll BMS detail</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollCeiAutoTest" type="checkbox">
					<span>Poll CEI auto test</span>
				</label>
			</div>
			<div class="col s12 m6">
				<label>
					<input class="value filled-in" id="pollPowerLimit" type="checkbox">
					<span>Poll power limit</span>
				</label>
			</div>
		</div>
	</div>
</div>
</body>
</html>
